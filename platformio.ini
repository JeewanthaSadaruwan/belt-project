; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = base_station2
[env:base_station]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    sandeepmistry/LoRa@^0.8.0
    bblanchon/ArduinoJson@^6.21.3
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
build_flags = 
    -DBASE_STATION
build_src_filter = 
    +<base_station/>
    -<belt/>
    -<example/>
    -<base_station2/>
    -<belt2/>

[env:belt]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    sandeepmistry/LoRa@^0.8.0
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    bblanchon/ArduinoJson@^6.21.3
build_flags = 
    -DBELT_DEVICE
build_src_filter = 
    +<belt/>
    -<base_station/>
    -<example/>
    -<base_station2/>
    -<belt2/>

[env:example]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = 
    sandeepmistry/LoRa@^0.8.0
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    bblanchon/ArduinoJson@^6.21.3
build_flags = 
    -DHAPTIC_NAVIGATION
build_src_filter = 
    +<example/>
    -<belt/>
    -<base_station/>
    -<base_station2/>
    -<belt2/>

[env:base_station2]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
build_flags = 
    -DBASE_STATION_WIFI
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
build_src_filter = 
    +<base_station2/>
    -<belt/>
    -<base_station/>
    -<example/>
    -<belt2/>

[env:belt2]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    bblanchon/ArduinoJson@^6.21.3
build_flags = 
    -DBELT_WIFI
build_src_filter = 
    +<belt2/>
    -<belt/>
    -<base_station/>
    -<example/>
    -<base_station2/>
    -<motor_test/>

[env:motor_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = 
    +<motor_test/>
    -<belt/>
    -<belt2/>
    -<base_station/>
    -<base_station2/>
    -<example/>
