; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = belt_esp
build_dir = C:/b
libdeps_dir = C:/l
core_dir = C:/p

; ── ESP 1: Belt ───────────────────────────────────────────────
[env:belt_esp]
platform = espressif32@6.8.1
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/Adafruit HMC5883 Unified@^1.2.1
    bblanchon/ArduinoJson@^6.21.3
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
build_flags =
    -DBELT_DEVICE
    -DCORE_DEBUG_LEVEL=0
build_src_filter =
    +<belt_esp/>
    -<belt_v1/>
    -<mesh_node_esp/>
    -<base_station_esp/>
    -<base_station/>
    -<example2/>
    -<example3/>
    -<example4/>

; ── ESP 2: Mesh Node (wired to belt, forwards via mesh+LoRa) ──
[env:mesh_node_esp]
platform = espressif32@6.8.1
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    bblanchon/ArduinoJson@^6.21.3
    painlessmesh/painlessMesh@^1.5.0
build_src_filter =
    +<mesh_node_esp/>
    -<belt_esp/>
    -<belt_v1/>
    -<base_station_esp/>
    -<base_station/>
    -<example2/>
    -<example3/>
    -<example4/>

; ── ESP 3: Base Station (mesh root + dashboard) ───────────────
[env:base_station_esp]
platform = espressif32@6.8.1
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa@^0.8.0
    bblanchon/ArduinoJson@^6.21.3
    painlessmesh/painlessMesh@^1.5.0
build_src_filter =
    +<base_station_esp/>
    -<belt_esp/>
    -<belt_v1/>
    -<mesh_node_esp/>
    -<base_station/>
    -<example2/>
    -<example3/>
    -<example4/>

