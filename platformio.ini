; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = base_station
[env:base_station]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    sandeepmistry/LoRa@^0.8.0
    bblanchon/ArduinoJson@^6.21.3
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
build_flags = 
    -DBASE_STATION
build_src_filter = 
    +<base_station/>
    -<belt/>
    -<example/>
    -<example2/>

[env:belt]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    sandeepmistry/LoRa@^0.8.0
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/Adafruit HMC5883 Unified@^1.2.1
    bblanchon/ArduinoJson@^6.21.3
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
build_flags = 
    -DBELT_DEVICE
build_src_filter = 
    +<belt/>
    -<base_station/>
    -<example/>
    -<example2/>

[env:example]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    sandeepmistry/LoRa@^0.8.0
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    bblanchon/ArduinoJson@^6.21.3
build_flags = 
    -DHAPTIC_NAVIGATION
build_src_filter = 
    +<example/>
    -<belt/>
    -<base_station/>
    -<example2/>

[env:example2]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    sandeepmistry/LoRa@^0.8.0
build_src_filter = 
    +<example2/>
    -<example/>
    -<belt/>
    -<base_station/>

[env:example3]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
    sandeepmistry/LoRa@^0.8.0
build_src_filter = 
    +<example3/>
    -<example2/>
    -<example/>
    -<belt/>
    -<base_station/>

[env:example4]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = 
    +<example4/>
    -<example3/>
    -<example2/>
    -<example/>
    -<belt/>
    -<base_station/>
